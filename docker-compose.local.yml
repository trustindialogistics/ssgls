name: company_1

services:
  mysql:
    image: mysql:8.0
    container_name: company_1_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ssgls
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - D:/SSGLS_DATABASE/mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  company_1:
    container_name: company_1
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    image: company_1:latest
    ports:
      - "8090:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: "HisabKitabb Services"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "base64:kgk/4DW1vEVy7aEvet5FPp5un6PIGe/so8H0mvoUtW0="
      APP_URL: "https://hisabkitabb.in"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ssgls
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: file
      SESSION_DRIVER: file
      SESSION_LIFETIME: "240"
      SESSION_DOMAIN: "hisabkitabb.in"
      SANCTUM_STATEFUL_DOMAINS: "hisabkitabb.in"
      SESSION_SECURE_COOKIE: "true"
      TRUSTED_PROXIES: "*"
      DOMPDF_ENABLE_REMOTE: "false"
      OFFICIAL_DOCUMENT_ARCHIVE_PATH: "/official-documents"
      GEMINI_API_KEY: "AQ.Ab8RN6KzJ3kHR0ueND5rOxQOnx3wmALmABm_QErtsY1nStT2ng"
    volumes:
      - D:/SSGLS_DATABASE/database.sqlite:/var/www/html/storage/app/database.sqlite
      - D:/Backup_Data:/var/www/html/Backup_Data
      - ./storage/app/public:/var/www/html/storage/app/public
      - ./storage/app/templates:/var/www/html/storage/app/templates
      - C:/DONOTTOUCH/IMPDOCUMENT:/official-documents
    restart: unless-stopped
